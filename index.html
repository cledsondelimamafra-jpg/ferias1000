<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias 1000 - Explorador Global</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{ "ferias1000": "./" }'
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
    </script>

    <script>
        // Inicialização direta da View sem depender de Component.js
        sap.ui.getCore().attachInit(function () {
            sap.ui.core.mvc.XMLView.create({
                viewName: "ferias1000.view.Main"
            }).then(function (oView) {
                oView.placeAt("content");
            }).catch(function (oError) {
                console.error("Erro ao instanciar a View XML:", oError);
            });
        });
    </script>

    <style>
        html, body, #content { height: 100%; margin: 0; padding: 0; }
        .sapUiBody { background-color: #f7f7f7; }
    </style>
</head>
<body class="sapUiBody" id="content">
    </body>
</html>
