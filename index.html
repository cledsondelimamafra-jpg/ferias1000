<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Férias 1000 - Explorador Global</title>

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script id="sap-ui-bootstrap"
        src="https://sdk.openui5.org/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{ "ferias1000": "./" }'
        data-sap-ui-libs="sap.m, sap.ui.unified"
        data-sap-ui-compatVersion="edge"
        data-sap-ui-async="true">
    </script>

    <script>
        // Inicialização limpa e assíncrona padrão OpenUI5
        sap.ui.require(["sap/ui/core/Core", "sap/ui/core/mvc/XMLView"], function (Core, XMLView) {
            "use strict";

            Core.ready().then(function () {
                XMLView.create({
                    viewName: "ferias1000.Main"
                }).then(function (oView) {
                    oView.placeAt("content");
                }).catch(function (oError) {
                    console.error("Erro ao criar a View XML:", oError);
                });
            });
        });
    </script>

    <style>
        html, body { 
            height: 100% !important; 
            margin: 0; 
            padding: 0; 
        }
        #content {
            height: 100% !important;
            width: 100% !important;
        }
        /* Garante que o container do mapa tenha tamanho físico na renderização */
        #mapa_container {
            height: 450px !important;
            width: 100% !important;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
            background-color: #e5e3df;
        }
    </style>
</head>
<body class="sapUiBody" id="content">
    </body>
</html>
