<!DOCTYPE HTML>
<html>
<head>
    <meta charset="UTF-8">
    <title>Férias 1000</title>
    <script id="sap-ui-bootstrap"
        src="https://ui5.sap.com/resources/sap-ui-core.js"
        data-sap-ui-theme="sap_horizon"
        data-sap-ui-resourceroots='{"ferias1000": "./"}'
        data-sap-ui-async="true"
        data-sap-ui-libs="sap.m, sap.ui.core"
        data-sap-ui-compatVersion="edge">
    </script>
    <script>
        sap.ui.getCore().attachInit(function () {
            // Aqui garantimos que o 'sap.m' está carregado antes de usar o Shell
            sap.ui.require(["sap/m/Shell", "sap/ui/core/ComponentContainer"], function (Shell, ComponentContainer) {
                new Shell({
                    app: new ComponentContainer({
                        name: "ferias1000",
                        height: "100%",
                        async: true
                    })
                }).placeAt("content");
            });
        });
    </script>
</head>
<body class="sapUiBody" id="content"></body>
</html>
